* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; padding: 20px; }
.container { max-width: 1100px; margin: 0 auto; }
h1 { text-align: center; color: #1a1a2e; margin-bottom: 4px; font-size: 26px; }
.subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 13px; }

.stats-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.stat-card { background: white; border-radius: 10px; padding: 12px 16px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.06); flex: 1; min-width: 80px; cursor: pointer; transition: all .2s; border: 2px solid transparent; }
.stat-card:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,0,0,0.1); }
.stat-card.active { border-color: #333; }
.stat-card .num { font-size: 22px; font-weight: 700; }
.stat-card .label { font-size: 10px; color: #666; margin-top: 2px; }
.stat-card.total .num { color: #3b82f6; }
.stat-card.no-web .num { color: #ef4444; }
.stat-card.social .num { color: #ea580c; }
.stat-card.has-web .num { color: #22c55e; }
.stat-card.pending .num { color: #6b7280; }
.stat-card.contacted .num { color: #f59e0b; }
.stat-card.converted .num { color: #22c55e; }
.stat-card.lost .num { color: #ef4444; }

.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 180px; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; outline: none; }
.search-box:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
.filter-select { padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; outline: none; background: white; }
.filter-select:focus { border-color: #3b82f6; }
.btn { padding: 9px 14px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-success { background: #22c55e; color: white; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: #ef4444; color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-outline { background: transparent; border: 1px solid #d1d5db; color: #333; }
.btn-outline:hover { background: #f3f4f6; }
.btn-sm { padding: 5px 10px; font-size: 11px; }

.business-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }

.card { background: white; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); display: flex; gap: 12px; transition: all .2s; border-left: 4px solid transparent; }
.card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); }
.card.status-pendiente { border-left-color: #6b7280; }
.card.status-contactado { border-left-color: #f59e0b; }
.card.status-convertido { border-left-color: #22c55e; }
.card.status-rechazado { border-left-color: #ef4444; opacity: .7; }
.card.deleted { opacity: .5; border-left-color: #9ca3af; }
.card .info { flex: 1; min-width: 0; }
.card .name { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.card .meta { font-size: 12px; color: #666; line-height: 1.5; }
.card .meta strong { color: #333; }
.card .phone { font-size: 14px; font-weight: 700; color: #2563eb; margin-top: 4px; }
.web-link { color: #2563eb; text-decoration: none; font-size: 12px; }
.web-link:hover { text-decoration: underline; }

.card .actions { display: flex; flex-direction: column; gap: 5px; min-width: 120px; }
.phone-link, .wa-link { display: inline-flex; align-items: center; justify-content: center; gap: 4px; padding: 5px 10px; border-radius: 6px; text-decoration: none; font-size: 11px; font-weight: 600; transition: all .2s; }
.phone-link { background: #2563eb; color: white; }
.phone-link:hover { background: #1d4ed8; }
.wa-link { background: #25D366; color: white; }
.wa-link:hover { background: #1ebe5d; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; letter-spacing: .2px; }
.badge.no-web { background: #fef2f2; color: #dc2626; }
.badge.social-only { background: #fff7ed; color: #ea580c; }
.badge.has-web { background: #f0fdf4; color: #16a34a; }

.status-btns { display: flex; gap: 3px; margin-top: 4px; }
.status-btn { padding: 3px 6px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 9px; cursor: pointer; background: white; transition: all .2s; font-weight: 600; }
.status-btn:hover { background: #f3f4f6; }
.status-btn.s-pendiente { background: #e5e7eb; color: #374151; border-color: #d1d5db; }
.status-btn.s-contactado { background: #fef3c7; color: #92400e; border-color: #f59e0b; }
.status-btn.s-convertido { background: #d1fae5; color: #065f46; border-color: #22c55e; }
.status-btn.s-rechazado { background: #fee2e2; color: #991b1b; border-color: #ef4444; }

.note-label { font-size: 10px; font-weight: 600; color: #6b7280; margin-top: 5px; margin-bottom: 2px; display: block; }
.note-input { margin-top: 2px; width: 100%; padding: 5px 7px; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 11px; resize: vertical; min-height: 26px; outline: none; font-family: inherit; }
.note-input:focus { border-color: #3b82f6; }

.btn-delete { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 14px; padding: 1px 5px; border-radius: 4px; transition: all .2s; line-height: 1; }
.btn-delete:hover { background: #fee2e2; color: #dc2626; }
.btn-restore { font-size: 11px; color: #3b82f6; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 2px 6px; }

.export-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.footer { text-align: center; color: #999; font-size: 11px; margin-top: 24px; padding-top: 14px; border-top: 1px solid #e5e7eb; line-height: 1.6; }

var DATA = [];
var CATEGORIES = [];
var sectionFilter = null;
var showDeleted = false;

function apiHeaders() {
var h = { 'Content-Type': 'application/json' };
if (API_KEY) h['Authorization'] = 'Bearer ' + API_KEY;
return h;
}

function apiCall(method, path, body) {
if (!API_URL) return;
var opts = { method: method, headers: apiHeaders() };
if (body) opts.body = JSON.stringify(body);
fetch(API_URL + path, opts).catch(function(){});
}

function getState() {
try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState(s) {
localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function getDeleted() { return getState()._deleted || []; }

function setStatus(id, st) {
var s = getState();
if (!s[id]) s[id] = {};
s[id].status = st;
saveState(s);
apiCall('PUT', '/negocios/' + id + '/status', { status: st });
render();
}

function getPriority(id) {
var s = getState();
return s[id] ? (s[id].priority || 'warm') : 'warm';
}

function setPriority(id, p) {
var s = getState();
if (!s[id]) s[id] = {};
s[id].priority = p;
saveState(s);
apiCall('PUT', '/negocios/' + id + '/priority', { priority: p });
render();
}

function getNotes(id) {
var s = getState();
if (!s[id]) return [];
var n = s[id].notes;
if (!n) return [];
if (typeof n === 'string') return [{ts: '', text: n}];
return n;
}

function addNote(id, text) {
var s = getState();
if (!s[id]) s[id] = {};
var now = new Date();
var ts = now.toLocaleDateString('es-CO', {day:'2-digit',month:'2-digit',year:'2-digit'}) + ' ' + now.toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'});
var existing = s[id].notes;
if (!existing || typeof existing === 'string') existing = [];
s[id].notes = existing.concat({ts: ts, text: text});
saveState(s);
apiCall('PUT', '/negocios/' + id + '/notes', { note: text });
render();
}

function deleteBusiness(id) {
if (!confirm('Eliminar este negocio de tu lista activa? Puedes restaurarlo desde "Mostrar eliminados".')) return;
var s = getState();
if (!s._deleted) s._deleted = [];
if (s._deleted.indexOf(id) === -1) s._deleted.push(id);
saveState(s);
apiCall('DELETE', '/negocios/' + id);
render();
}

function restoreBusiness(id) {
var s = getState();
if (s._deleted) s._deleted = s._deleted.filter(function(d) { return d !== id; });
saveState(s);
apiCall('POST', '/negocios/' + id + '/restore');
render();
}

function initFilters() {
var sel = document.getElementById('categoryFilter');
CATEGORIES.forEach(function(c) {
var o = document.createElement('option');
o.value = c;
o.textContent = c;
sel.appendChild(o);
});
}

function resetFilters() {
document.getElementById('searchBox').value = '';
document.getElementById('categoryFilter').value = '';
document.getElementById('statusFilter').value = '';
document.getElementById('webFilter').value = '';
render();
}

function setSectionFilter(type) {
sectionFilter = sectionFilter === type ? null : type;
render();
}

function toggleDeleted() {
showDeleted = !showDeleted;
document.getElementById('showDeletedBtn').textContent = showDeleted ? 'Ocultar eliminados' : 'Mostrar eliminados';
render();
}

function exportJSON() {
var state = getState();
var payload = { version: 1, exportedAt: new Date().toISOString(), data: state };
var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8;' });
var a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = 'prospeccion_bogota.json';
a.click();
}

function importJSON(event) {
var file = event.target.files[0];
if (!file) return;
var reader = new FileReader();
reader.onload = function(e) {
try {
var payload = JSON.parse(e.target.result);
if (!payload.data || !payload.version) { alert('Archivo invalido. Selecciona un JSON exportado desde esta herramienta.'); return; }
saveState(payload.data);
render();
alert('Datos importados. ' + Object.keys(payload.data).length + ' registros restaurados.');
} catch(err) {
alert('Error al leer el archivo.');
}
};
reader.readAsText(file);
event.target.value = '';
}

function exportCSV() {
var rows = [['Nombre','Telefono','Direccion','Categoria','Tipo Web','URL Web','Estado','Prioridad','Notas']];
var state = getState();
DATA.forEach(function(d) {
var st = state[d.id] ? (state[d.id].status || 'pendiente') : 'pendiente';
var pr = getPriority(d.id);
var prLabels = { hot:'Caliente', warm:'Tibio', cold:'Frio' };
var notesArr = getNotes(d.id);
var nt = notesArr.map(function(n) { return (n.ts ? n.ts + ' ' : '') + n.text; }).join(' | ');
rows.push([d.name, d.phone, d.addr, d.cat, d.webType === 'no-web' ? 'Sin web' : d.webType === 'social-only' ? 'Redes' : 'Con web', d.webUrl, st, prLabels[pr], nt]);
});
var csv = rows.map(function(r) { return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
var a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = 'prospeccion_bogota.csv';
a.click();
}

txt += '💤 Tibios: ' + p.warm + '\n';

txt += '--- DETALLE ---\n\n';

var notesArr = getNotes(d.id);

var a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = 'resumen_prospeccion.txt';

function render() {
var search = document.getElementById('searchBox').value.toLowerCase().trim();
var catFilter = document.getElementById('categoryFilter').value;
var priorityFilter = document.getElementById('priorityFilter').value;
var statusFilter = document.getElementById('statusFilter').value;
var webFilter = document.getElementById('webFilter').value;

var state = getState();
var deleted = getDeleted();
var activeData = DATA.filter(function(d) { return deleted.indexOf(d.id) === -1; });
var deletedData = DATA.filter(function(d) { return deleted.indexOf(d.id) !== -1; });

var counts = { total: activeData.length, 'no-web':0, 'social-only':0, 'has-web':0, pendiente:0, contactado:0, convertido:0, rechazado:0, eliminados: deletedData.length, hot:0, warm:0, cold:0 };

var source = showDeleted ? deletedData : activeData;
var filtered = source.filter(function(d) {
counts[d.webType]++;
var st = state[d.id] ? (state[d.id].status || 'pendiente') : 'pendiente';
var pr = getPriority(d.id);
counts[pr]++;
counts[st]++;
if (sectionFilter && d.webType !== sectionFilter) return false;
if (search && d.name.toLowerCase().indexOf(search) === -1 && d.addr.toLowerCase().indexOf(search) === -1 && d.cat.toLowerCase().indexOf(search) === -1) return false;
if (catFilter && d.cat !== catFilter) return false;
if (priorityFilter && pr !== priorityFilter) return false;
if (statusFilter && st !== statusFilter) return false;
if (webFilter && d.webType !== webFilter) return false;
return true;
});

var statConfig = [
{key:'total', cls:'total', label:'Activos'},
{key:'eliminados', cls:'total', label:'Eliminados'},
{key:'no-web', cls:'no-web', label:'Sin web'},
{key:'social-only', cls:'social', label:'Solo redes'},
{key:'has-web', cls:'has-web', label:'Con web'},
{key:'hot', cls:'total', label:'🔥 Calientes'},
{key:'warm', cls:'total', label:'💤 Tibios'},
{key:'cold', cls:'total', label:'❄️ Fríos'},
{key:'pendiente', cls:'pending', label:'Pendiente'},
{key:'contactado', cls:'contacted', label:'Contactado'},
{key:'convertido', cls:'converted', label:'Convertido'},
{key:'rechazado', cls:'lost', label:'Rechazado'}
];

var statTypeMap = { 'no-web':'no-web', 'social-only':'social-only', 'has-web':'has-web' };
var statsHtml = '';
statConfig.forEach(function(c) {
var active = sectionFilter === statTypeMap[c.key] ? 'active' : '';
statsHtml += '<div class="stat-card ' + c.cls + ' ' + active + '" onclick="setSectionFilter(\' + (statTypeMap[c.key] || '') + \')"><div class="num">' + counts[c.key] + '</div><div class="label">' + c.label + '</div></div>';
});
document.getElementById('statsRow').innerHTML = statsHtml;

document.getElementById('resultsInfo').textContent = 'Mostrando ' + filtered.length + ' de ' + activeData.length + ' activos · ' + deletedData.length + ' eliminados' + (showDeleted ? ' (mostrando eliminados)' : '');

var html = '';
filtered.forEach(function(d) {
var st = state[d.id] ? (state[d.id].status || 'pendiente') : 'pendiente';
var pr = getPriority(d.id);
var notesArr = getNotes(d.id);
var isDel = deleted.indexOf(d.id) !== -1;

var webBadge = d.webType === 'no-web' ? '<span class="badge no-web">Sin sitio web</span>' :
d.webType === 'social-only' ? '<span class="badge social-only">' + d.webLabel + '</span>' :
'<span class="badge has-web">Con web</span>';

var webMeta = '';
if (d.webType === 'has-web') webMeta = '<div class="meta"><strong>Sitio web:</strong> <a href="' + d.webUrl + '" target="_blank" class="web-link">' + d.webLabel + '</a></div>';
else if (d.webType === 'social-only') webMeta = '<div class="meta"><strong>Presencia:</strong> <a href="' + d.webUrl + '" target="_blank" class="web-link">' + d.webLabel + '</a></div>';

var mapsQuery = encodeURIComponent(d.name + ', ' + d.addr + ', Bogota, Colombia');
var mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + mapsQuery;

var waMsg = d.webType === 'has-web'
? encodeURIComponent('¡Hola ' + d.name.split('-')[0].trim() + '! Vi tu sitio web y me gustaria comentarte algunas ideas para mejorarlo. ¿Te interesaria?')
: encodeURIComponent('¡Hola ' + d.name.split('-')[0].trim() + '! Te contactaba porque vi tu negocio en Google Maps y note que no tienes pagina web. Me dedico a crear sitios web profesionales para negocios en Bogota. ¿Te interesaria saber mas?');

var prioIcons = { hot: '🔥', warm: '💤', cold: '❄️' };

var statusLabels = { pendiente: 'Pend', contactado: 'Cont', convertido: 'Conv', rechazado: 'Desc' };
var statusBtns = '';
['pendiente', 'contactado', 'convertido', 'rechazado'].forEach(function(s) {
statusBtns += '<button class="status-btn ' + (st === s ? 's-' + s : '') + '" onclick="setStatus(\' + d.id + \',\' + s + \')">' + statusLabels[s] + '</button>';
});

var quickNotes = [
{label:'No contestó', emoji:'📵'},
{label:'Dejé mensaje', emoji:'💬'},
{label:'Interesado', emoji:'👍'},
{label:'Enviar cotización', emoji:'💰'},
{label:'Llamar después', emoji:'⏰'},
{label:'No le interesa', emoji:'👎'}
];

var notesHtml = '';
notesArr.forEach(function(n) {
notesHtml += '<div style="font-size:11px;color:#555;padding:2px 0;border-bottom:1px solid #f0f0f0">';
if (n.ts) notesHtml += '<span style="color:#999;font-size:10px">' + n.ts + '</span> ';
notesHtml += n.text + '</div>';
});

var quickBtnsHtml = '';
quickNotes.forEach(function(q) {
quickBtnsHtml += '<button class="status-btn" onclick="addNote(\' + d.id + \',\' + q.emoji + ' ' + q.label + \')" title="' + q.label + '">' + q.emoji + '</button>';
});

if (isDel) {
html += '<div class="card deleted"><div class="info"><div class="name" style="text-decoration:line-through;opacity:.7">' + d.name + '</div><div class="meta">' + d.phone + ' · ' + d.cat + '</div></div><div class="actions" style="justify-content:center"><span class="badge no-web">Eliminado</span><button class="btn-restore" onclick="restoreBusiness(\' + d.id + \')">Restaurar</button></div></div>';
} else {
html += '<div class="card status-' + st + '">';
html += '<div class="info">';
html += '<div class="name">' + prioIcons[pr] + ' ' + d.name + ' <button class="btn-delete" onclick="deleteBusiness(\' + d.id + \')" title="Eliminar">✕</button></div>';
html += '<div class="meta"><strong>Categoria:</strong> ' + d.cat + '</div>';
html += '<div class="meta">' + d.addr + ' <a href="' + mapsUrl + '" target="_blank" class="web-link" title="Ver en Google Maps">📍 Ver mapa</a></div>';
html += webMeta;
html += '<div class="phone">' + d.phone + '</div>';
html += '<div style="margin-top:6px"><span style="font-size:10px;font-weight:600;color:#6b7280">Prioridad:</span> ';
html += '<button class="status-btn ' + (pr === 'hot' ? 's-convertido' : '') + '" onclick="setPriority(\' + d.id + \',\'hot\')">🔥</button> ';
html += '<button class="status-btn ' + (pr === 'warm' ? 's-contactado' : '') + '" onclick="setPriority(\' + d.id + \',\'warm\')">💤</button> ';
html += '<button class="status-btn ' + (pr === 'cold' ? 's-rechazado' : '') + '" onclick="setPriority(\' + d.id + \',\'cold\')">❄️</button> ';
html += '</div>';
html += '<div class="note-label">Historial de actividad</div>';
html += '<div style="max-height:120px;overflow-y:auto;margin-bottom:4px">' + (notesHtml || '<div style="font-size:11px;color:#bbb;padding:4px 0">Sin actividad registrada</div>') + '</div>';
html += '<div style="display:flex;gap:2px;flex-wrap:wrap;margin-bottom:4px">' + quickBtnsHtml + '</div>';
html += '<textarea class="note-input" placeholder="Escribe una nota personalizada..." onchange="addNote(\' + d.id + \',this.value)" onfocus="this.value=''"></textarea>';
html += '</div>';
html += '<div class="actions">';
html += webBadge;
html += '<a href="tel:' + d.phoneClean + '" class="phone-link">📞 Llamar</a>';
html += '<a href="https://wa.me/' + d.phoneClean + '?text=' + waMsg + '" target="_blank" class="wa-link">💬 WhatsApp</a>';
html += '<a href="' + mapsUrl + '" target="_blank" class="wa-link" style="background:#ea580c">📍 Maps</a>';
html += '<div class="status-btns">' + statusBtns + '</div>';
html += '</div>';
html += '</div>';
}
});

document.getElementById('businessList').innerHTML = html;
}

function initDarkMode() {
var dark = localStorage.getItem(STORAGE_KEY + '_dark') === 'true';
if (dark) { document.body.classList.add('dark-mode'); document.getElementById('darkToggle').textContent = '☀️'; }
}
function toggleDarkMode() {
var on = document.body.classList.toggle('dark-mode');
document.getElementById('darkToggle').textContent = on ? '☀️' : '🌙';
localStorage.setItem(STORAGE_KEY + '_dark', on);
}

function initOffline() {
DATA = DATA_FALLBACK;
DATA.forEach(function(d) { if (CATEGORIES.indexOf(d.cat) === -1) CATEGORIES.push(d.cat); });
CATEGORIES.sort();
initFilters();
initDarkMode();
document.getElementById('subtitle').textContent = 'Modo offline · Tus estados/notas se guardan en el navegador';
render();
}

function initAPIMode() {
document.getElementById('subtitle').textContent = 'Conectando con el servidor...';
var opts = { headers: { 'Content-Type': 'application/json' } };
if (API_KEY) opts.headers['Authorization'] = 'Bearer ' + API_KEY;
fetch(API_URL + '/negocios', opts)
.then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
.then(function(resp) {
if (!resp.ok) throw new Error(resp.error || 'API error');
var apiData = resp.data;
DATA = apiData.map(function(r) {
return { id: r.id, name: r.name, cat: r.cat, addr: r.addr, phone: r.phone, phoneClean: r.phoneClean, webType: r.webType, webUrl: r.webUrl, webLabel: r.webLabel };
});
DATA.forEach(function(d) { if (CATEGORIES.indexOf(d.cat) === -1) CATEGORIES.push(d.cat); });
CATEGORIES.sort();
var state = {};
apiData.forEach(function(r) {
var notes = [];
try { notes = typeof r.notes === 'string' ? JSON.parse(r.notes) : (r.notes || []); } catch(e) {}
state[r.id] = { status: r.status || 'pendiente', priority: r.priority || 'warm', notes: notes };
if (r.deleted) {
if (!state._deleted) state._deleted = [];
state._deleted.push(r.id);
}
});
localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
initFilters();
initDarkMode();
document.getElementById('subtitle').textContent = 'Conectado al servidor · Los cambios se sincronizan automáticamente';
render();
})
.catch(function(err) {
console.warn('API no disponible, usando datos locales:', err);
initOffline();
});
}

function initApp() {
if (API_URL) {
initAPIMode();
} else {
initOffline();
}
}

initApp();
